<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <title>Navbar - Rockstar Style</title>
</head>

<body class="min-h-screen bg-[url('https://static.toiimg.com/thumb/msid-120373743,width-1280,height-720,resizemode-4/120373743.jpg')] bg-cover bg-center bg-no-repeat">

  <!-- OPTIONAL: overlay for readability -->
  <div class="fixed inset-0 bg-black/30 -z-10"></div>

  <!-- ✅ mobile collapse toggle (NO JS) -->
  <input id="navToggle" type="checkbox" class="peer hidden" />

  <!-- NAVBAR (transparent over bg) -->
  <nav class="w-full text-white font-semibold">
    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 pt-4">
      <div class="flex justify-between items-center">

        <!-- LEFT: logo + mobile hamburger -->
        <div class="flex items-center gap-3">
          <!-- hamburger (mobile only) -->
          <label for="navToggle" class="md:hidden cursor-pointer p-2 rounded-md hover:bg-white/10">
            <i class="fa-solid fa-bars text-[18px]"></i>
          </label>

          <!-- logo (remove inline style, use tailwind sizing) -->
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTmxv4td2ynhX7g3Zb57znBYp8oqGt6uAAMKA&s"
            alt="icon"
            class="h-12 w-auto object-contain"
          />
        </div>

        <!-- CENTER: tabs (desktop only) -->
        <div class="hidden md:flex items-center gap-10 lg:gap-12 tracking-wide text-[13px] lg:text-[14px]">

          <!-- ✅ Dropdown 1: GAMES (hover) -->
          <div class="relative group">
            <a href="#"
               class="inline-flex items-center gap-2 border-b-2 border-transparent hover:border-orange-400 pb-2 text-white/90 hover:text-white">
              GAMES
              <i class="fa-solid fa-chevron-down text-[11px] transition group-hover:rotate-180"></i>
            </a>

            <div
              class="absolute left-0 top-full mt-3 w-56 rounded-xl bg-black/70 backdrop-blur-md border border-white/10 shadow-xl
                     opacity-0 scale-95 pointer-events-none
                     group-hover:opacity-100 group-hover:scale-100 group-hover:pointer-events-auto
                     transition duration-200 z-30">
              <div class="p-2">
                <a class="block px-3 py-2 rounded-lg hover:bg-white/10 text-sm" href="#">GTA Series</a>
                <a class="block px-3 py-2 rounded-lg hover:bg-white/10 text-sm" href="#">Red Dead</a>
                <a class="block px-3 py-2 rounded-lg hover:bg-white/10 text-sm" href="#">Max Payne</a>
                <a class="block px-3 py-2 rounded-lg hover:bg-white/10 text-sm" href="#">All Games</a>
              </div>
            </div>
          </div>

          <a href="#" class="border-b-2 border-transparent hover:border-orange-400 pb-2 text-white/90 hover:text-white">NEWSWIRE</a>
          <a href="#" class="border-b-2 border-transparent hover:border-orange-400 pb-2 text-white/90 hover:text-white">DOWNLOADS</a>
          <a href="#" class="border-b-2 border-transparent hover:border-orange-400 pb-2 text-white/90 hover:text-white">VIDEOS</a>

          <!-- ✅ Dropdown 2: STORE (hover) -->
          <div class="relative group">
            <a href="#"
               class="inline-flex items-center gap-2 border-b-2 border-transparent hover:border-orange-400 pb-2 text-white/90 hover:text-white">
              STORE
              <i class="fa-solid fa-chevron-down text-[11px] transition group-hover:rotate-180"></i>
            </a>

            <div
              class="absolute left-0 top-full mt-3 w-56 rounded-xl bg-black/70 backdrop-blur-md border border-white/10 shadow-xl
                     opacity-0 scale-95 pointer-events-none
                     group-hover:opacity-100 group-hover:scale-100 group-hover:pointer-events-auto
                     transition duration-200 z-30">
              <div class="p-2">
                <a class="block px-3 py-2 rounded-lg hover:bg-white/10 text-sm" href="#">Merchandise</a>
                <a class="block px-3 py-2 rounded-lg hover:bg-white/10 text-sm" href="#">Gift Cards</a>
                <a class="block px-3 py-2 rounded-lg hover:bg-white/10 text-sm" href="#">Game Keys</a>
                <a class="block px-3 py-2 rounded-lg hover:bg-white/10 text-sm" href="#">Support Store</a>
              </div>
            </div>
          </div>

        </div>

        <!-- RIGHT: actions -->
        <div class="flex items-center gap-3 sm:gap-4">
          <button
            class="border border-white/40 rounded-full px-4 py-2 text-[13px] sm:text-[14px]
                   hover:border-white hover:border-l-4 hover:border-l-orange-400 transition bg-white/0 hover:bg-white/10">
            Get Launcher
          </button>

          <!-- icons better UI (clickable area) -->
          <a href="#" class="p-2 rounded-md hover:bg-white/10" aria-label="Search">
            <i class="fa-solid fa-magnifying-glass"></i>
          </a>
          <a href="#" class="p-2 rounded-md hover:bg-white/10" aria-label="Account">
            <i class="fa-solid fa-user"></i>
          </a>
        </div>

      </div>
    </div>
  </nav>

  <!-- ✅ overlay for mobile drawer -->
  <label for="navToggle"
    class="fixed inset-0 bg-black/50 opacity-0 pointer-events-none peer-checked:opacity-100 peer-checked:pointer-events-auto transition z-40 md:hidden">
  </label>

  <!-- ✅ left drawer (mobile only) -->
  <aside
    class="fixed top-0 left-0 h-full w-[78%] max-w-sm bg-black/80 backdrop-blur-md text-white shadow-2xl
           -translate-x-full peer-checked:translate-x-0 transition-transform duration-300 z-50 md:hidden">

    <div class="h-14 px-4 flex items-center justify-between border-b border-white/10">
      <span class="font-semibold">Menu</span>
      <label for="navToggle" class="cursor-pointer p-2 rounded-md hover:bg-white/10">
        <i class="fa-solid fa-xmark text-[18px]"></i>
      </label>
    </div>

    <div class="p-3 space-y-1 text-[14px] tracking-wide">

      <!-- Mobile dropdowns: use details (better than hover on mobile) -->
      <details class="group">
        <summary class="list-none cursor-pointer px-3 py-3 rounded-lg hover:bg-white/10 flex items-center justify-between">
          <span>GAMES</span>
          <i class="fa-solid fa-chevron-down text-[12px] transition group-open:rotate-180"></i>
        </summary>
        <div class="pl-3 pb-2">
          <a href="#" class="block px-3 py-2 rounded-lg hover:bg-white/10 text-sm">GTA Series</a>
          <a href="#" class="block px-3 py-2 rounded-lg hover:bg-white/10 text-sm">Red Dead</a>
          <a href="#" class="block px-3 py-2 rounded-lg hover:bg-white/10 text-sm">All Games</a>
        </div>
      </details>

      <a href="#" class="block px-3 py-3 rounded-lg hover:bg-white/10">NEWSWIRE</a>
      <a href="#" class="block px-3 py-3 rounded-lg hover:bg-white/10">DOWNLOADS</a>
      <a href="#" class="block px-3 py-3 rounded-lg hover:bg-white/10">VIDEOS</a>

      <details class="group">
        <summary class="list-none cursor-pointer px-3 py-3 rounded-lg hover:bg-white/10 flex items-center justify-between">
          <span>STORE</span>
          <i class="fa-solid fa-chevron-down text-[12px] transition group-open:rotate-180"></i>
        </summary>
        <div class="pl-3 pb-2">
          <a href="#" class="block px-3 py-2 rounded-lg hover:bg-white/10 text-sm">Merchandise</a>
          <a href="#" class="block px-3 py-2 rounded-lg hover:bg-white/10 text-sm">Gift Cards</a>
          <a href="#" class="block px-3 py-2 rounded-lg hover:bg-white/10 text-sm">Game Keys</a>
        </div>
      </details>

      <div class="pt-2">
        <button
          class="w-full border border-white/40 rounded-full px-4 py-2
                 hover:border-white hover:border-l-4 hover:border-l-orange-400 transition hover:bg-white/10">
          Get Launcher
        </button>
      </div>
    </div>
  </aside>

</body>
</html>
