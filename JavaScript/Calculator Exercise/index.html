<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
     <div class="container">
    <input type="text" placeholder="0" readonly />

    <div class="btn">
      <button onclick="operation7();">7</button>
      <button onclick="operation8();">8</button>
      <button onclick="operation9();">9</button>
      <button onclick="division();">/</button>

      <button onclick="operation4();">4</button>
      <button onclick="operation5();">5</button>
      <button onclick="operation6();">6</button>
      <button onclick="product();">*</button>

      <button onclick="operation1();">1</button>
      <button onclick="operation2();">2</button>
      <button onclick="operation3();">3</button>
      <button onclick="subtract();">-</button>

      <button onclick="operation0();">0</button>
      <button onclick="decimal();">.</button>
      <button onclick="reset();">C</button>
      <button onclick="add();">+</button>

      <button class="equal" onclick="result();">=</button>
    </div>
  </div>
    
    <script src="script.js"></script>
</body>
</html>
