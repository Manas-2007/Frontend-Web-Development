 <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

bg-white/20 backdrop-blur-[12px]

      <span class="block w-[26px] h-[2px] bg-black mb-[6px]"></span>

<!-- ✅ MOBILE OVERLAY (click = close) -->

</label>
